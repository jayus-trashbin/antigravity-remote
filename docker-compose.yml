version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: antigravity-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    # Initialize with deepseek-coder model
    command: >
      sh -c "ollama serve & 
      sleep 10 && 
      ollama pull deepseek-coder && 
      wait"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  antigravity-remote:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antigravity-remote
    ports:
      - "3333:3333"
      - "5173:5173"
    environment:
      - PORT=3333
      - CDP_PORT=9222
      - AUTH_PIN=${AUTH_PIN:-1234}
      - NODE_ENV=production
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=deepseek-coder
    volumes:
      - ./data:/app/data
      - ./certs:/app/certs
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - antigravity-network

  # Optional: Nginx reverse proxy for production
  # nginx:
  #   image: nginx:alpine
  #   container_name: antigravity-proxy
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - antigravity-remote
  #   networks:
  #     - antigravity-network

volumes:
  ollama_data:
    driver: local

networks:
  antigravity-network:
    driver: bridge

name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
    tags: ['v*']
  pull_request:
    branches: [master, develop]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: TypeScript validation (Server)
        run: cd server && npx tsc --noEmit
      
      - name: TypeScript validation (Client)
        run: cd client && npx tsc --noEmit
      
      - name: Lint check
        run: |
          cd server && npm run lint 2>/dev/null || echo "No lint script"
          cd ../client && npm run lint 2>/dev/null || echo "No lint script"
        continue-on-error: true

  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build server
        run: cd server && npm run build
      
      - name: Build client
        run: cd client && npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            server/dist/
            client/dist/
          retention-days: 1

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}:buildcache,mode=max

  test-docker:
    name: Test Docker Compose
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Start services
        run: docker-compose up -d
      
      - name: Wait for services
        run: sleep 30
      
      - name: Check service health
        run: |
          docker-compose ps
          docker-compose exec -T antigravity-remote curl -k https://localhost:3333/ || echo "Server check failed"
      
      - name: View logs
        if: failure()
        run: docker-compose logs
      
      - name: Cleanup
        if: always()
        run: docker-compose down

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, build, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Antigravity Remote Release ${{ github.ref }}
            
            Docker image: `${{ env.REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}`
            
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}
            docker-compose up -d
            ```
          draft: false
          prerelease: false

  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [validate, build, docker]
    if: always()
    
    steps:
      - name: Build status
        run: |
          if [ "${{ needs.validate.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build failed!"
            exit 1
          else
            echo "✅ Build successful!"
          fi
